name: Publish to Maven Central

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    name: Publish Kotlin bindings to Maven Central
    runs-on: ubuntu-latest
    environment:
      name: maven-central
      url: https://central.sonatype.com/
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build Rust library
        run: cargo build --release

      - name: Generate Kotlin bindings with UniFFI
        run: |
          mkdir -p kotlin/generated
          cargo run --bin uniffi-bindgen generate \
            --library target/release/libmmex_lib.so \
            --language kotlin \
            --out-dir kotlin/generated

      - name: Generate GPG key for signing
        working-directory: ./kotlin
        run: |
          gpg --batch --gen-key <<EOF
          %no-protection
          Key-Type: RSA
          Key-Length: 4096
          Name-Real: mmex-lib-ci
          Name-Email: ci@mmex-lib.local
          Expire-Date: 0
          %commit
          EOF
          GPG_KEY_ID=$(gpg --list-keys --keyid-format short "ci@mmex-lib.local" | grep -oP '(?<=rsa4096/)[A-F0-9]+' | head -1)
          echo "GPG_KEY_ID=$GPG_KEY_ID" >> $GITHUB_ENV
          gpg --export-secret-keys --armor "ci@mmex-lib.local" > /tmp/signing-key.asc
          echo "SIGNING_KEY<<EOFMARKER" >> $GITHUB_ENV
          cat /tmp/signing-key.asc >> $GITHUB_ENV
          echo "EOFMARKER" >> $GITHUB_ENV
          echo "SIGNING_PASSWORD=" >> $GITHUB_ENV
          gpg --keyserver keyserver.ubuntu.com --send-keys "$GPG_KEY_ID" || true

      - name: Verify Gradle wrapper
        working-directory: ./kotlin
        run: |
          chmod +x gradlew
          ./gradlew --version

      - name: Build and stage artifacts
        working-directory: ./kotlin
        env:
          ORG_GRADLE_PROJECT_signingKey: ${{ env.SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingPassword: ${{ env.SIGNING_PASSWORD }}
        run: ./gradlew publishMavenJavaPublicationToLocalStagingRepository

      - name: Create deployment bundle
        working-directory: ./kotlin/build/staging-deploy
        run: zip -r ../bundle.zip .

      - name: Publish to Central Portal
        working-directory: ./kotlin/build
        env:
          CENTRAL_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          CENTRAL_PASSWORD: ${{ secrets.OSSRH_PASSWORD }}
        run: |
          BEARER=$(echo -n "${CENTRAL_USERNAME}:${CENTRAL_PASSWORD}" | base64 -w0)
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST "https://central.sonatype.com/api/v1/publisher/upload" \
            -H "Authorization: Bearer ${BEARER}" \
            -F "bundle=@bundle.zip")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          echo "HTTP Status: $HTTP_CODE"
          echo "Response: $BODY"
          if [ "$HTTP_CODE" -ne 201 ]; then
            echo "Upload failed!"
            exit 1
          fi
          echo "Deployment ID: $BODY"
