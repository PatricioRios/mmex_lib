name: Publish to Maven Central

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    name: Publish Kotlin bindings to Maven Central
    runs-on: ubuntu-latest
    environment:
      name: maven-central
      url: https://central.sonatype.com/
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build Rust library
        run: cargo build --release

      - name: Generate Kotlin bindings with UniFFI
        run: |
          mkdir -p kotlin/generated
          cargo run --bin uniffi-bindgen generate \
            --library target/release/libmmex_lib.so \
            --language kotlin \
            --out-dir kotlin/generated

      - name: Build and stage artifacts
        working-directory: ./kotlin
        uses: gradle/actions/build@v4
        with:
          arguments: publishMavenJavaPublicationToLocalStagingRepository
          build-root-directory: ./kotlin

      - name: Create deployment bundle
        working-directory: ./kotlin/build/staging-deploy
        run: zip -r ../bundle.zip .

      - name: Publish to Central Portal
        working-directory: ./kotlin/build
        env:
          OSSRH_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          OSSRH_PASSWORD: ${{ secrets.OSSRH_PASSWORD }}
        run: |
          BEARER=$(echo -n "${OSSRH_USERNAME}:${OSSRH_PASSWORD}" | base64 -w0)
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST "https://central.sonatype.com/api/v1/publisher/upload" \
            -H "Authorization: Bearer ${BEARER}" \
            -F "bundle=@bundle.zip")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          echo "HTTP Status: $HTTP_CODE"
          echo "Response: $BODY"
          if [ "$HTTP_CODE" -ne 201 ]; then
            echo "Upload failed!"
            exit 1
          fi
          echo "Deployment ID: $BODY"
